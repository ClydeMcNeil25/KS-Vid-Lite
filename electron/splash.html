<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>KS-Vid-Lite</title>
    <style>
      body {
        margin: 0;
        width: 100vw;
        height: 100vh;
        background: radial-gradient(circle at top, #2b145f, #0f0f14 65%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Arial, sans-serif;
        overflow: hidden;
      }

      .card {
        text-align: center;
        color: white;
      }

      .logo-img {
	    width: 120px;
	    height: auto;
	    display: block;
	    margin: 0 auto 20px auto;
	    filter: drop-shadow(0 0 15px rgba(139, 92, 246, 0.6));
	  }

      .title {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 8px;
      }

      .tagline {
        font-size: 14px;
        color: #c9b8ff;
        margin-bottom: 25px;
      }

      .loader {
        width: 220px;
        height: 6px;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 999px;
        overflow: hidden;
        margin: 0 auto;
      }

      .bar {
        height: 100%;
        width: 45%;
        background: #8b5cf6;
        border-radius: 999px;
        animation: loading 1.2s infinite ease-in-out;
      }

      .status {
        margin-top: 15px;
        font-size: 12px;
        color: #aaa;
      }

      @keyframes loading {
        0% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(260%);
        }
      }
    </style>
  </head>

  <body>
    <div class="card">
      <img src="file:///D:/Dropbox/05 Development/KS-Vid-Lite/electron/assets/ks-logo-purple.png" class="logo-img" />

      <div class="title">KS-Vid-Lite</div>
      <div class="tagline">AI-Assisted Video Editing Engine</div>

      <div class="loader">
        <div class="bar"></div>
      </div>

      <div class="status">Initializing backend & interface...</div>
    </div>
  </body>
</html>
